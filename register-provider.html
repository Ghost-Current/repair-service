<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join as a Professional | ServiceHub</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50 text-gray-800 font-sans">

    <nav class="bg-white shadow-md">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <a href="index.html" class="text-2xl font-bold text-blue-600 flex items-center gap-2">
                        <i class="fa-solid fa-handshake-angle"></i> ServiceHub
                    </a>
                </div>
                <div class="flex items-center space-x-4">
                    <a href="index.html" class="text-gray-700 hover:text-blue-600 font-medium">Find Services</a>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-xl mx-auto my-12 px-4">
        <div class="bg-white p-8 rounded-2xl shadow-md border border-gray-100">
            <div class="text-center mb-8">
                <h1 class="text-3xl font-bold text-gray-900 mb-2">Grow Your Local Business</h1>
                <p class="text-gray-500">Register your service profile so clients in your immediate neighborhood can find and contact you instantly.</p>
            </div>

            <form id="registrationForm" onsubmit="handleRegistration(event)" class="space-y-5">
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Full Name / Business Name</label>
                    <input type="text" required placeholder="e.g., John's VoltFix Repairs" class="w-full px-4 py-2.5 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>

                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Service Specialty</label>
                    <select required class="w-full px-4 py-2.5 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white">
                        <option value="">Select your skill...</option>
                        <option value="Electrical">Electrical Repairs</option>
                        <option value="Plumbing">Plumbing</option>
                        <option value="Web Development">Web Development</option>
                        <option value="Cleaning">Home Cleaning</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Your Operational Location (City/Area)</label>
                    <input type="text" required placeholder="e.g., Lekki Phase 1" class="w-full px-4 py-2.5 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>

                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Active Phone Number (Include Country Code)</label>
                    <input type="tel" required placeholder="e.g., +2348012345678" class="w-full px-4 py-2.5 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>

                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Brief Business Bio / Description of Skills</label>
                    <textarea required rows="4" placeholder="Explain what you do, what tools you use, and how quickly you respond..." class="w-full px-4 py-2.5 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"></textarea>
                </div>

                <button type="submit" class="w-full bg-blue-600 text-white font-bold py-3 rounded-lg hover:bg-blue-700 transition shadow-md">
                    List My Service Online
                </button>
            </form>
        </div>
    </main>

    <script>
        function handleRegistration(event) {
            event.preventDefault();
            alert("Awesome! Once your completely free Supabase backend is linked, this button will submit your business live onto the home page grid instantly!");
        }
    </script>
</body>
</html>
