<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product - MyStore</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<header>
  <div class="nav">
    <a href="javascript:history.back()" style="color:white">← Back</a>
    <h2>Product</h2>
    <a href="cart.html" style="color:white">Cart <span class="cart-count">0</span></a>
  </div>
</header>

<div class="container">
  <div class="product-page" id="productDetail"></div>
</div>

<script src="app.js"></script>
<script>
const id = new URLSearchParams(window.location.search).get('id');
const allProducts = {
 1:{name:"Uncle Ben's Rice 5kg", price:12500, desc:"Premium long grain rice. Perfect for jollof."},
 2:{name:"Devon Kings Oil 5L", price:8500, desc:"100% pure vegetable cooking oil."},
 3:{name:"Milo 1.5kg", price:8500, desc:"Energy drink for the whole family."}
};
const p = allProducts[id] || {name:"Product", price:0, desc:"Description here"};

document.getElementById('productDetail').innerHTML = `
  <img src="https://via.placeholder.com/400x400" alt="${p.name}">
  <div>
    <h1>${p.name}</h1>
    <div class="price">₦${p.price.toLocaleString()}</div>
    <p>${p.desc}</p>
    <button class="btn" onclick="addToCart(${id},'${p.name}',${p.price})">Add to Cart</button>
    <a class="btn" style="background:#25D366; display:block; text-align:center; text-decoration:none; margin-top:8px"
       href="https://wa.me/2349062873274?text=Order%20${encodeURIComponent(p.name)}">Order via WhatsApp</a>
  </div>
`;
</script>
</body>
</html>
