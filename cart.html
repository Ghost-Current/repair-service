<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cart - MyStore</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<header>
  <div class="nav">
    <a href="index.html" style="color:white">← Continue Shopping</a>
    <h2>Your Cart</h2>
    <span style="color:white">Items: <span class="cart-count">0</span></span>
  </div>
</header>

<div class="container">
  <div id="cartItems"></div>
  <h3 id="total" style="margin-top:20px"></h3>
  <button class="btn" onclick="checkout()">Checkout via WhatsApp</button>
</div>

<script src="app.js"></script>
<script>
function showCart() {
  let cart = JSON.parse(localStorage.getItem('cart')) || [];
  if(cart.length == 0) {
    document.getElementById('cartItems').innerHTML = '<p>Your cart is empty</p>';
    return;
  }
  let html = '';
  let total = 0;
  cart.forEach(item => {
    total += item.price * item.qty;
    html += `<div class="card" style="margin-bottom:10px">
      <h3>${item.name}</h3>
      <p>Qty: ${item.qty} x ₦${item.price.toLocaleString()}</p>
      <p class="price">₦${(item.price * item.qty).toLocaleString()}</p>
    </div>`;
  });
  document.getElementById('cartItems').innerHTML = html;
  document.getElementById('total').textContent = 'Total: ₦' + total.toLocaleString();
}

function checkout() {
  let cart = JSON.parse(localStorage.getItem('cart')) || [];
  let msg = 'Hello, I want to order:%0A';
  cart.forEach(i => msg += `${i.qty}x ${i.name}%0A`);
  window.location = 'https://wa.me/2349062873274?text=' + msg;
}

showCart();
</script>
</body>
</html>
