<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MyStore - Nigeria's Online Shop</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<header>
  <div class="nav">
    <h2><a href="index.html" style="color:white; text-decoration:none">MyStore</a></h2>
    <input type="text" placeholder="Search for products...">
    <a href="cart.html" style="color:white">Cart <span class="cart-count">0</span></a>
  </div>
</header>

<div class="container">
  <h2>Shop by Category</h2>
  <div class="grid">
    <a href="category.html?cat=groceries" class="card cat"><h3>Groceries</h3></a>
    <a href="category.html?cat=electronics" class="card cat"><h3>Electronics</h3></a>
    <a href="category.html?cat=baby" class="card cat"><h3>Baby Products</h3></a>
  </div>

  <h2 style="margin-top:30px">Today's Deals</h2>
  <div class="grid" id="deals"></div>
</div>

<script src="app.js"></script>
<script>
const deals = [
  {id:1, name:"Uncle Ben's Rice 5kg", price:12500},
  {id:2, name:"Devon Kings Oil 5L", price:8500},
  {id:3, name:"Milo 1.5kg", price:8500},
  {id:4, name:"Golden Penny Spaghetti", price:850}
];
document.getElementById('deals').innerHTML = deals.map(p => `
  <div class="card">
    <img src="https://via.placeholder.com/200x180" alt="${p.name}">
    <h3>${p.name}</h3>
    <div class="price">₦${p.price.toLocaleString()}</div>
    <button class="btn" onclick="addToCart(${p.id},'${p.name}',${p.price})">Add to Cart</button>
    <a href="product.html?id=${p.id}" class="btn" style="background:#333; margin-top:5px; display:block; text-align:center; text-decoration:none">View</a>
  </div>
`).join('');
</script>
</body>
</html>
