<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Category - MyStore</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<header>
  <div class="nav">
    <a href="index.html" style="color:white">← Home</a>
    <h2 id="catTitle">Products</h2>
    <a href="cart.html" style="color:white">Cart <span class="cart-count">0</span></a>
  </div>
</header>

<div class="container">
  <div class="grid" id="products"></div>
</div>

<script src="app.js"></script>
<script>
const urlParams = new URLSearchParams(window.location.search);
const cat = urlParams.get('cat') || 'groceries';
document.getElementById('catTitle').textContent = cat.charAt(0).toUpperCase() + cat.slice(1);

const products = {
  groceries: [
    {id:5, name:'Maggi Chicken 400cubes', price:3000},
    {id:6, name:'Indomie Noodles Carton', price:7500},
    {id:7, name:'Peak Milk 400g', price:2800}
  ],
  electronics: [
    {id:8, name:'Itel Phone A60', price:52000},
    {id:9, name:'Binatone Blender', price:18500}
  ],
  baby: [
    {id:10, name:'Pampers Size 4', price:9500},
    {id:11, name:'Cerelac 400g', price:3500}
  ]
};

let list = products[cat] || [];
document.getElementById('products').innerHTML = list.map(p => `
  <div class="card">
    <a href="product.html?id=${p.id}"><img src="https://via.placeholder.com/200x180" alt="${p.name}"></a>
    <h3>${p.name}</h3>
    <div class="price">₦${p.price.toLocaleString()}</div>
    <button class="btn" onclick="addToCart(${p.id},'${p.name}',${p.price})">Add to Cart</button>
  </div>
`).join('');
</script>
</body>
</html>
