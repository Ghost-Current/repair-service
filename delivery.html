<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page 2: Delivery & Order Details</title>
    <style>
        :root {
            --primary-color: #4f46e5; 
            --warning-color: #dc2626; /* Crimson red for strict matching reminder */
            --warning-bg: #fef2f2;
            --text-main: #1f2937;
            --text-muted: #4b5563;
            --bg-body: #f3f4f6;
            --bg-card: #ffffff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            line-height: 1.6;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .checkout-card {
            background: var(--bg-card);
            max-width: 600px;
            width: 100%;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            padding: 32px;
            border: 1px solid #e5e7eb;
        }

        .header {
            text-align: center;
            margin-bottom: 24px;
        }

        .header h1 {
            font-size: 24px;
            color: var(--text-main);
            font-weight: 700;
        }

        /* Strict Bank Name Matching Reminder Banner */
        .name-match-reminder {
            background-color: var(--warning-bg);
            border: 2px solid #fca5a5;
            border-left: 6px solid var(--warning-color);
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 24px;
        }

        .name-match-reminder h3 {
            color: #991b1b;
            font-size: 15px;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .name-match-reminder p {
            color: #7f1d1d;
            font-size: 13.5px;
            font-weight: 500;
        }

        .section-title {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 16px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-muted);
            border-bottom: 1px solid #e5e7eb;
            padding-bottom: 6px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 6px;
        }

        .form-group input, .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-size: 15px;
            background-color: #f8fafc;
            transition: all 0.2s;
        }

        .form-group input:focus, .form-group textarea:focus {
            outline: none;
            border-color: var(--primary-color);
            background-color: #fff;
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }

        .readonly-items {
            background-color: #f1f5f9;
            color: #334155;
            font-weight: 500;
            cursor: not-allowed;
        }

        .submit-btn {
            width: 100%;
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        .submit-btn:hover {
            background: #4338ca;
        }

        @media (max-width: 480px) {
            .checkout-card {
                padding: 20px;
            }
        }
    </style>
</head>
<body>

    <div class="checkout-card">
        
        <div class="header">
            <h1>Delivery & Order Details</h1>
        </div>

        <!-- 1. Strict Name Matching Reminder -->
        <div class="name-match-reminder">
            <h3>⚠️ CRITICAL PAYMENT NOTICE</h3>
            <p>The <strong>Full Name</strong> you enter below must perfectly match the account name on the bank app you will use to send funds. Unmatched names will delay payment confirmation on our system.</p>
        </div>

        <!-- Form submitting directly to your Trello board -->
        <form action="https://formsubmit.co/chineduudeh2008+xhp2upd1ocd2sdnrmj9f@boards.trello.com" method="POST">
            
            <!-- FormSubmit Custom Configurations -->
            <input type="hidden" name="_captcha" value="false">
            <input type="hidden" name="_subject" value="New Order Placed - Waiting for Payment">
            
            <!-- LINK TO PAGE 3: Replace the URL value below with the actual link to your Page 3 file -->
            <input type="hidden" name="_next" value="https://yourwebsite.com/page3.html">

            <!-- 2. Ordered Items Section -->
            <div class="section-title">Your Order Summary</div>
            <div class="form-group">
                <label for="orderedItems">Items Selected</label>
                <!-- This field captures the items. If you are using JavaScript to generate the cart, you can populate this dynamically. -->
                <textarea name="Ordered_Items" id="orderedItems" rows="3" class="readonly-items" required placeholder="Example: 1x Smart Hybrid Inverter, 2x Connection Cables"></textarea>
            </div>

            <!-- 3. Customer Delivery Info Section -->
            <div class="section-title">Delivery Information</div>
            
            <div class="form-group">
                <label for="fullName">Your Full Name (Must Match Bank Name)</label>
                <input type="text" name="Customer_Name" id="fullName" placeholder="e.g. John Doe" required>
            </div>

            <div class="form-group">
                <label for="phone">Phone Number</label>
                <input type="tel" name="Customer_Phone" id="phone" placeholder="e.g. +234..." required>
            </div>

            <div class="form-group">
                <label for="address">Complete Delivery Address</label>
                <textarea name="Delivery_Address" id="address" rows="3" placeholder="Street name, City, State" required></textarea>
            </div>

            <!-- Submit Button -->
            <button type="submit" class="submit-btn">
                Confirm Order & Proceed to Payment
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
            </button>

        </form>
    </div>

</body>
</html>
